# AbetaIndex configuration
[abetaindex]
enabled = true
tracer = "AV45"

# SUVr parameter configuration
[suvr.regions.centiloid]
voi_mask = "centiloid_voi"
ref_mask = "whole_cerebral"

[suvr.regions.centaur]
voi_mask = "centaur_voi"
ref_mask = "centaur_ref"

# Fill-states tracer-specific resources
[fillstates.tracers.fbp]
