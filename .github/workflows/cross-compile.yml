name: Cross-platform build and release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(startsWith(github.ref, 'refs/tags/') && '["ubuntu-latest","windows-latest","macos-latest","macos-14"]' || '["ubuntu-latest","windows-latest"]') }}

    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan

      - name: Cache Conan packages (Windows/macOS)
        if: runner.os != 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('localizer/src/conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      # Keep the legacy cache separate from the normal Linux cache: Conan may cache
      # build tools such as Boost's b2, and tools built on ubuntu-latest can require
      # newer glibc symbols than the manylinux2014/CentOS 7 container provides.
      - name: Cache legacy Linux Conan packages
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dccc-conan2-legacy
          key: ${{ runner.os }}-legacy-glibc217-conan-${{ hashFiles('localizer/src/conanfile.py', 'docker/Dockerfile.core.legacy', 'scripts/docker-build-core.sh', '.github/workflows/cross-compile.yml') }}
          restore-keys: |
            ${{ runner.os }}-legacy-glibc217-conan-

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Install GCC-12 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-12
          echo "CC=gcc-12" >> $GITHUB_ENV
          echo "CXX=g++-12" >> $GITHUB_ENV

      - name: Conan profile detect (macOS)
        if: runner.os == 'macOS'
        working-directory: localizer/src
        shell: bash
        run: |
          conan profile detect --force

      - name: Conan profile detect (Windows)
        if: runner.os == 'Windows'
        working-directory: localizer/src
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install (macOS)
        if: runner.os == 'macOS'
        working-directory: localizer/src
        shell: bash
        run: |
          conan install . --output-folder=build --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=17 \
            -c tools.cmake.cmaketoolchain:generator=Ninja \
            -o onetbb/*:tbbmalloc=False \
            -o onetbb/*:tbbproxy=False

      - name: Configure with CMake (macOS)
        if: runner.os == 'macOS'
        working-directory: localizer/src
        shell: bash
        run: |
          cmake -S . \
            -B build \
            -G "Ninja" \
            -DCMAKE_TOOLCHAIN_FILE="./build/conan_toolchain.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="./install"

      - name: Build with CMake (macOS)
        if: runner.os == 'macOS'
        working-directory: localizer/src
        shell: bash
        run: cmake --build build --config Release

      - name: Install with CMake (macOS)
        if: runner.os == 'macOS'
        working-directory: localizer/src
        shell: bash
        run: cmake --install build --config Release

      - name: Build legacy Linux Docker image
        if: runner.os == 'Linux'
        shell: bash
        run: |
          docker build \
            --build-arg USER_UID="$(id -u)" \
            --build-arg USER_GID="$(id -g)" \
            -f docker/Dockerfile.core.legacy \
            -t dccc-core-dev:legacy-glibc217 .

      - name: Build and install with legacy Linux container
        if: runner.os == 'Linux'
        shell: bash
        run: |
          legacy_conan_home="$RUNNER_TEMP/dccc-conan2-legacy"
          mkdir -p "$legacy_conan_home"
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$legacy_conan_home:/home/dev/.conan2" \
            -e CONAN_CPPSTD=gnu17 \
            -e CONAN_BUILD_ARGS='--build=missing --build=b2/* --build=m4/* --build=autoconf/* --build=automake/* --build=libtool/* --build=pkgconf/*' \
            -e BUILD_TYPE=Release \
            -e INSTALL_PREFIX=./install \
            dccc-core-dev:legacy-glibc217 \
            /workspace/scripts/docker-build-core.sh

      - name: Verify Linux glibc compatibility floor
        if: runner.os == 'Linux'
        working-directory: localizer/src
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t elf_files < <(find install/bin -maxdepth 1 -type f -exec sh -c 'file "$1" | grep -q ELF' sh {} \; -print)
          max_glibc=$(objdump -T "${elf_files[@]}" \
            | sed -n 's/.*(GLIBC_\([0-9][0-9.]*\)).*/\1/p' \
            | sort -V \
            | tail -n 1)
          echo "Maximum referenced GLIBC version: ${max_glibc:-none}"
          if [[ -n "${max_glibc}" ]] && [[ "$(printf '%s\n%s\n' "2.17" "${max_glibc}" | sort -V | tail -n 1)" != "2.17" ]]; then
            echo "Linux package references GLIBC_${max_glibc}; expected no symbols newer than GLIBC_2.17." >&2
            exit 1
          fi

      - name: Run PR smoke tests on installed binary (Linux)
        if: github.event_name == 'pull_request' && runner.os == 'Linux'
        working-directory: localizer/src/tests
        shell: bash
        run: |
          set -e
          python -m pip install pytest pandas
          python -m pytest -v test_ui_metric_command_builder.py test_quick_cli.py -k "help or version_information or no_subcommand"

      - name: Run pytest on installed binary (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        working-directory: localizer/src/tests
        shell: bash
        run: |
          set -e
          python -m pip install pytest pandas
          python -m pytest -v

      - name: Set up MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup CMake
        id: setup-cmake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '3.27.9'

      - name: Verify CMake version
        run: cmake --version
          
      - name: Conan install (Windows)
        if: runner.os == 'Windows'
        working-directory: localizer/src
        shell: pwsh
        run: |
          conan install . --output-folder=build --build=missing `
            -s build_type=Release `
            -s compiler.cppstd=17 `
            -c tools.cmake.cmaketoolchain:generator=Ninja `
            -o onetbb/*:tbbmalloc=False `
            -o onetbb/*:tbbproxy=False

      - name: Configure with CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: localizer/src
        shell: pwsh
        run: |
          cmake --version
          cmake -S . `
            -B build `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="./build/conan_toolchain.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="./install"

      - name: Build with CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: localizer/src
        shell: pwsh
        run: cmake --build build --config Release

      - name: Install with CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: localizer/src
        shell: pwsh
        run: cmake --install build --config Release

      - name: Run PR smoke tests on installed binary (Windows)
        if: github.event_name == 'pull_request' && runner.os == 'Windows'
        working-directory: localizer/src/tests
        shell: pwsh
        run: |
          python -m pip install pytest pandas
          python -m pytest -v test_ui_metric_command_builder.py test_quick_cli.py -k "help or version_information or no_subcommand"

      - name: Run pytest on installed binary (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        working-directory: localizer/src/tests
        shell: pwsh
        run: |
          python -m pip install pytest pandas
          python -m pytest -v

      - name: Copy install/bin into localizer/cpp (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        working-directory: localizer/src
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/localizer/cpp"
          cp -a install/bin/. "$GITHUB_WORKSPACE/localizer/cpp/"

      - name: Copy install/bin into localizer/cpp (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        working-directory: localizer/src
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/localizer/cpp" | Out-Null
          Copy-Item -Path install/bin/* -Destination "$env:GITHUB_WORKSPACE/localizer/cpp/" -Recurse -Force

      - name: Determine package metadata
        if: startsWith(github.ref, 'refs/tags/')
        id: package-metadata
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          set -euo pipefail

          case "${MATRIX_OS:-$RUNNER_OS}" in
            macos-*)
              platform="${MATRIX_OS:-macos}-arm64"
              ;;
            ubuntu-*)
              platform="${MATRIX_OS:-linux}-x64"
              ;;
            windows-*)
              platform="${MATRIX_OS:-windows}-x64"
              ;;
            macOS)
              platform="macos-arm64"
              ;;
            Linux)
              platform="linux-x64"
              ;;
            Windows)
              platform="windows-x64"
              ;;
            *)
              platform="${MATRIX_OS:-$RUNNER_OS}"
              ;;
          esac

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            if latest_tag=$(git describe --tags --abbrev=0 2>/dev/null); then
              version="${latest_tag#v}-dev-${GITHUB_RUN_NUMBER}"
            else
              version="0.0.0-dev-${GITHUB_RUN_NUMBER}"
            fi
          fi

          echo "PACKAGE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "PACKAGE_PLATFORM=${platform}" >> "$GITHUB_ENV"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "platform=${platform}" >> "$GITHUB_OUTPUT"

      - name: Assemble standalone core package (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        working-directory: localizer/src
        run: |
          set -euo pipefail
          package_dir="$GITHUB_WORKSPACE/DCCCcore-${PACKAGE_VERSION}-${PACKAGE_PLATFORM}"
          rm -rf "$package_dir"
          mkdir -p "$package_dir"
          cp -a install/bin/. "$package_dir/"
          cp README.md "$package_dir/README.md"
          cp "$GITHUB_WORKSPACE/LICENSE.md" "$package_dir/LICENSE.md"

      - name: Assemble standalone core package (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        working-directory: localizer/src
        run: |
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "DCCCcore-$env:PACKAGE_VERSION-$env:PACKAGE_PLATFORM"

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item -Path install/bin/* -Destination $packageDir -Recurse -Force
          Copy-Item -Path README.md -Destination (Join-Path $packageDir 'README.md') -Force
          Copy-Item -Path (Join-Path $env:GITHUB_WORKSPACE 'LICENSE.md') -Destination (Join-Path $packageDir 'LICENSE.md') -Force

      - name: Create distributable zip (standalone core)
        if: startsWith(github.ref, 'refs/tags/')
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: DCCCcore-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_PLATFORM }}.zip
          path: DCCCcore-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_PLATFORM }}

      - name: Upload standalone core artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: DCCCcore-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_PLATFORM }}
          path: DCCCcore-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_PLATFORM }}.zip
          if-no-files-found: error

      - name: Clean packaging workspace (Linux/macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf \
            .git \
            .github \
            demo \
            ninja-build \
            localizer/src \
            "DCCCcore-${PACKAGE_VERSION}-${PACKAGE_PLATFORM}" \
            "DCCCcore-${PACKAGE_VERSION}-${PACKAGE_PLATFORM}.zip" \
            "DCCCSlicer-${PACKAGE_VERSION}-${PACKAGE_PLATFORM}" \
            "DCCCSlicer-${PACKAGE_VERSION}-${PACKAGE_PLATFORM}.zip"
          rm -f .gitmodules

      - name: Clean packaging workspace (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $pathsToRemove = @(
            '.git',
            '.github',
            'demo',
            'ninja-build',
            'localizer\src',
            "DCCCcore-$env:PACKAGE_VERSION-$env:PACKAGE_PLATFORM",
            "DCCCcore-$env:PACKAGE_VERSION-$env:PACKAGE_PLATFORM.zip",
            "DCCCSlicer-$env:PACKAGE_VERSION-$env:PACKAGE_PLATFORM",
            "DCCCSlicer-$env:PACKAGE_VERSION-$env:PACKAGE_PLATFORM.zip"
          )

          foreach ($path in $pathsToRemove) {
            if (Test-Path $path) {
              Remove-Item $path -Recurse -Force
            }
          }

          if (Test-Path '.gitmodules') {
            Remove-Item '.gitmodules' -Force
          }

      - name: Create distributable zip (entire project)
        if: startsWith(github.ref, 'refs/tags/')
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: DCCCSlicer-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_PLATFORM }}.zip
          path: .

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: DCCCSlicer-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_PLATFORM }}
          path: DCCCSlicer-${{ env.PACKAGE_VERSION }}-${{ env.PACKAGE_PLATFORM }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: DCCC*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DCCCSlicer-*.zip
            dist/DCCCcore-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Cloudflare R2 endpoint
        id: r2-endpoint
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID || secrets.R2_ACCOUND_ID }}
          R2_TOKEN_VALUE: ${{ secrets.R2_TOKEN_VALUE }}
        run: |
          set -euo pipefail

          if [[ -n "${R2_ACCOUNT_ID}" ]]; then
            endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          elif [[ -z "${R2_TOKEN_VALUE}" ]]; then
            echo "Set R2_ACCOUNT_ID, R2_ACCOUND_ID, or R2_TOKEN_VALUE to resolve the R2 endpoint." >&2
            exit 1
          elif [[ "${R2_TOKEN_VALUE}" == http://* || "${R2_TOKEN_VALUE}" == https://* ]]; then
            endpoint="${R2_TOKEN_VALUE%/}"
          elif [[ "${R2_TOKEN_VALUE}" =~ ^[A-Fa-f0-9]{32}$ ]]; then
            endpoint="https://${R2_TOKEN_VALUE}.r2.cloudflarestorage.com"
          else
            account_id="$(
              curl -fsS \
                -H "Authorization: Bearer ${R2_TOKEN_VALUE}" \
                -H "Content-Type: application/json" \
                https://api.cloudflare.com/client/v4/accounts |
                python3 -c 'import json, sys; data = json.load(sys.stdin); print((data.get("result") or [{}])[0].get("id", ""))'
            )"

            if [[ -z "${account_id}" ]]; then
              echo "Could not resolve a Cloudflare account ID from R2_TOKEN_VALUE." >&2
              echo "Set R2_TOKEN_VALUE to the account ID, full R2 endpoint, or an API token with account list access." >&2
              exit 1
            fi

            endpoint="https://${account_id}.r2.cloudflarestorage.com"
          fi

          echo "::add-mask::${endpoint}"
          echo "endpoint=${endpoint}" >> "$GITHUB_OUTPUT"

      - name: Upload Windows DCCCSlicer package to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ steps.r2-endpoint.outputs.endpoint }}
        run: |
          set -euo pipefail

          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            export PATH="${HOME}/.local/bin:${PATH}"
          fi

          shopt -s nullglob
          assets=(dist/DCCCSlicer-*-windows-x64.zip)
          shopt -u nullglob

          if (( ${#assets[@]} != 1 )); then
            echo "Expected exactly one Windows DCCCSlicer package, found ${#assets[@]}." >&2
            printf '%s\n' "${assets[@]}" >&2
            exit 1
          fi

          asset="${assets[0]}"
          object_key="releases/${GITHUB_REF_NAME}/$(basename "${asset}")"

          aws s3 cp "${asset}" "s3://${R2_BUCKET_NAME}/${object_key}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --only-show-errors

          echo "Uploaded $(basename "${asset}") to R2 object key ${object_key}."
